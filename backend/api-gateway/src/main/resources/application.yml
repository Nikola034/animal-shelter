server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/users/**, /api/auth/**

        - id: animal-registry
          uri: http://localhost:8002
          predicates:
            - Path=/api/animals/**, /api/medical/**

        - id: activity-tracking
          uri: http://localhost:8003
          predicates:
            - Path=/api/activities/**, /api/feeding/**, /api/metrics/**

        - id: analytics-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/analytics/**, /api/reports/**
