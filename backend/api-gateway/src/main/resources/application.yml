server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: user-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/users/**, /api/auth/**

        - id: animal-registry
          uri: http://localhost:8002
          predicates:
            - Path=/api/animals/**, /api/medical/**

        - id: activity-tracking
          uri: http://localhost:8003
          predicates:
            - Path=/api/activities/**, /api/feeding/**, /api/measurements/**

        - id: analytics-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/analytics/**, /api/reports/**

jwt:
  secret: YourBase64EncodedSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm

gateway:
  auth:
    excluded-paths:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh-token
      - /api/animals/images/**
      - /actuator/**
  rate-limit:
    requests-per-second: 20
    burst-capacity: 40

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
