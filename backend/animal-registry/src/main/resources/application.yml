server:
  port: 8002

spring:
  application:
    name: animal-registry
  data:
    mongodb:
      uri: mongodb://localhost:27017/animal_registry
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

app:
  upload:
    dir: ./uploads/animals
    allowed-types: image/jpeg,image/png,image/webp,image/gif
    max-images-per-animal: 10

embedding:
  api:
    url: http://localhost:9090

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-6
  max-tokens: 2048

rag:
  search:
    default-limit: 5
    enabled: true
