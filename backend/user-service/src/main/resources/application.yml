server:
  port: 8001

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/animal_shelter_users
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: YourBase64EncodedSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm
  access-token-expiration: 360000
  refresh-token-expiration: 604800000
