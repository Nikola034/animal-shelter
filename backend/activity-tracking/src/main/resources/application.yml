server:
  port: 8003

spring:
  application:
    name: activity-tracking
  data:
    mongodb:
      uri: mongodb://localhost:27017/activity_tracking
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    mapper:
      accept-case-insensitive-enums: true
    time-zone: Europe/Belgrade
