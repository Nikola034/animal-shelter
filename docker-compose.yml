services:

  postgres:
    image: postgres:16-alpine
    container_name: shelter-postgres
    environment:
      POSTGRES_DB: animal_shelter_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/seed-data/01-users.sql:/docker-entrypoint-initdb.d/01-users.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: shelter-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 15

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shelter-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  text2vec-transformers:
    image: semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    container_name: shelter-text2vec
    environment:
      ENABLE_CUDA: '0'
    ports:
      - "9090:8080"
    restart: on-failure

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: shelter-user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  animal-registry:
    build:
      context: ./backend
      dockerfile: animal-registry/Dockerfile
    container_name: shelter-animal-registry
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8002:8002"
    volumes:
      - uploads_data:/app/uploads/animals
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      text2vec-transformers:
        condition: service_started
    restart: on-failure

  activity-tracking:
    build:
      context: ./backend
      dockerfile: activity-tracking/Dockerfile
    container_name: shelter-activity-tracking
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8003:8003"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  analytics-service:
    build:
      context: ./backend
      dockerfile: analytics-service/Dockerfile
    container_name: shelter-analytics-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8004:8004"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: shelter-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - animal-registry
      - activity-tracking
      - analytics-service
    restart: on-failure

  frontend:
    build:
      context: ./frontend
    container_name: shelter-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: on-failure

volumes:
  postgres_data:
  mongodb_data:
  uploads_data:
