<div class="layout-wrapper min-h-screen flex flex-column">
  <!-- Topbar -->
  <app-topbar (toggleSidebar)="onToggleSidebar()"></app-topbar>

  <!-- Content area -->
  <div class="flex flex-1">
    <!-- Sidebar -->
    <div class="flex-shrink-0 transition-duration-300" [style.width]="sidebarVisible ? '250px' : '0px'"
         [style.overflow]="'hidden'">
      <app-sidebar [visible]="sidebarVisible"></app-sidebar>
    </div>

    <!-- Main content -->
    <div class="flex-1 p-4 surface-ground">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
