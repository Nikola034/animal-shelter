<!-- Welcome Section -->
<div class="mb-4">
  <h1 class="text-3xl font-bold m-0 mb-2">
    Welcome back, {{ username }}
  </h1>
  <div class="flex align-items-center gap-2">
    <span class="text-color-secondary">Logged in as</span>
    <p-tag [value]="role" [severity]="roleSeverity" [rounded]="true"></p-tag>
  </div>
</div>

<!-- Admin Stats Cards -->
<div class="grid" *ngIf="isAdmin">
  <div class="col-12 md:col-6 lg:col-3">
    <p-card styleClass="shadow-2">
      <div class="flex align-items-center gap-3">
        <div class="flex align-items-center justify-content-center border-round bg-blue-100 text-blue-600"
             style="width: 3rem; height: 3rem;">
          <i class="pi pi-users text-2xl"></i>
        </div>
        <div>
          <div class="text-color-secondary text-sm">Total Users</div>
          <div class="text-3xl font-bold">{{ totalUsers }}</div>
        </div>
      </div>
    </p-card>
  </div>

  <div class="col-12 md:col-6 lg:col-3">
    <p-card styleClass="shadow-2">
      <div class="flex align-items-center gap-3">
        <div class="flex align-items-center justify-content-center border-round bg-yellow-100 text-yellow-600"
             style="width: 3rem; height: 3rem;">
          <i class="pi pi-clock text-2xl"></i>
        </div>
        <div>
          <div class="text-color-secondary text-sm">Pending Approval</div>
          <div class="text-3xl font-bold">{{ pendingUsers }}</div>
        </div>
      </div>
    </p-card>
  </div>

  <div class="col-12 md:col-6 lg:col-3">
    <p-card styleClass="shadow-2">
      <div class="flex align-items-center gap-3">
        <div class="flex align-items-center justify-content-center border-round bg-green-100 text-green-600"
             style="width: 3rem; height: 3rem;">
          <i class="pi pi-check-circle text-2xl"></i>
        </div>
        <div>
          <div class="text-color-secondary text-sm">Active Users</div>
          <div class="text-3xl font-bold">{{ activeUsers }}</div>
        </div>
      </div>
    </p-card>
  </div>

  <div class="col-12 md:col-6 lg:col-3">
    <p-card styleClass="shadow-2">
      <div class="flex align-items-center gap-3">
        <div class="flex align-items-center justify-content-center border-round bg-red-100 text-red-600"
             style="width: 3rem; height: 3rem;">
          <i class="pi pi-ban text-2xl"></i>
        </div>
        <div>
          <div class="text-color-secondary text-sm">Inactive Users</div>
          <div class="text-3xl font-bold">{{ inactiveUsers }}</div>
        </div>
      </div>
    </p-card>
  </div>
</div>

<!-- Non-Admin Welcome -->
<div *ngIf="!isAdmin">
  <p-card styleClass="shadow-2">
    <div class="text-center py-4">
      <i class="pi pi-heart-fill text-primary text-5xl mb-3"></i>
      <h2 class="m-0 mb-2">Animal Shelter Management System</h2>
      <p class="text-color-secondary m-0">
        You are logged in as <strong>{{ role }}</strong>. Use the sidebar menu to navigate.
      </p>
    </div>
  </p-card>
</div>
