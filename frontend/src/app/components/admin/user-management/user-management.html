<p-toast position="top-center"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="mb-4">
  <h1 class="text-3xl font-bold m-0 mb-2">User Management</h1>
  <p class="text-color-secondary m-0">Manage user accounts, roles, and statuses</p>
</div>

<p-card styleClass="shadow-2">
  <ng-template pTemplate="content">

    <!-- Filter Bar -->
    <div class="flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <p-dropdown [options]="statusFilterOptions" [(ngModel)]="statusFilter"
                  (onChange)="onStatusFilterChange()" placeholder="Filter by status"
                  styleClass="w-12rem filter-input-responsive"></p-dropdown>

      <p-button icon="pi pi-refresh" label="Refresh" [text]="true" (onClick)="loadUsers()"></p-button>
    </div>

    <!-- Users Table -->
    <p-table [value]="users" [loading]="loading" [paginator]="true" [rows]="10"
             [rowsPerPageOptions]="[5, 10, 25]" [showCurrentPageReport]="true"
             currentPageReportTemplate="Showing {first} to {last} of {totalRecords} users"
             styleClass="p-datatable-sm p-datatable-striped"
             [responsiveLayout]="'scroll'">

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="username">Username <p-sortIcon field="username"></p-sortIcon></th>
          <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
          <th pSortableColumn="role">Role <p-sortIcon field="role"></p-sortIcon></th>
          <th pSortableColumn="status">Status <p-sortIcon field="status"></p-sortIcon></th>
          <th pSortableColumn="created_at">Created <p-sortIcon field="created_at"></p-sortIcon></th>
          <th>Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <span class="font-semibold">{{ user.username }}</span>
          </td>
          <td>{{ user.name || '-' }}</td>
          <td>{{ user.email }}</td>
          <td>
            <p-dropdown [options]="roleOptions" [ngModel]="user.role"
                        (onChange)="onRoleChange(user, $event.value)"
                        [appendTo]="'body'"
                        styleClass="w-10rem" [style]="{'min-width': '10rem'}"></p-dropdown>
          </td>
          <td>
            <p-dropdown [options]="statusOptions" [ngModel]="user.status"
                        (onChange)="onStatusChange(user, $event.value)"
                        [appendTo]="'body'"
                        styleClass="w-9rem" [style]="{'min-width': '9rem'}"></p-dropdown>
          </td>
          <td>
            {{ user.created_at | date:'dd/MM/yyyy HH:mm' }}
          </td>
          <td>
            <div class="flex gap-1">
              <p-button icon="pi pi-pencil" severity="info" [text]="true" [rounded]="true"
                        (onClick)="openEditDialog(user)" pTooltip="Edit profile"></p-button>
              <p-button icon="pi pi-trash" severity="danger" [text]="true" [rounded]="true"
                        (onClick)="confirmDelete(user)" pTooltip="Delete user"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-center py-4">
            <i class="pi pi-users text-4xl text-color-secondary mb-3 block"></i>
            <span class="text-color-secondary">No users found</span>
          </td>
        </tr>
      </ng-template>

    </p-table>

  </ng-template>
</p-card>

<!-- Edit User Profile Dialog -->
<p-dialog header="Edit User Profile" [(visible)]="editDialogVisible" [modal]="true"
          [style]="{width: '450px'}" [closable]="true">
  <div *ngIf="editingUser" class="flex flex-column gap-3 pt-2">
    <div>
      <label class="block font-medium mb-2">Username</label>
      <input pInputText [value]="editingUser.username" [disabled]="true" class="w-full" />
      <small class="text-color-secondary">Username cannot be changed</small>
    </div>
    <div>
      <label class="block font-medium mb-2">Name</label>
      <input pInputText [(ngModel)]="editName" placeholder="Enter name" class="w-full" />
    </div>
    <div>
      <label class="block font-medium mb-2">Email</label>
      <input pInputText [(ngModel)]="editEmail" placeholder="Enter email" class="w-full" type="email" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" [text]="true" severity="secondary" (onClick)="editDialogVisible = false"></p-button>
    <p-button label="Save" icon="pi pi-check" [loading]="savingEdit" (onClick)="saveUserProfile()"></p-button>
  </ng-template>
</p-dialog>
