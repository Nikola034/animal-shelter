<p-toast></p-toast>

<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <div>
      <h2 class="m-0"><i class="pi pi-user mr-2"></i>My Profile</h2>
      <p class="text-color-secondary mt-1 mb-0">Manage your account settings</p>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-content-center py-5">
    <i class="pi pi-spin pi-spinner text-4xl text-primary"></i>
  </div>

  <div *ngIf="!loading && user" class="grid">
    <!-- Account Info Card -->
    <div class="col-12 lg:col-4">
      <p-card styleClass="shadow-1 h-full">
        <div class="text-center">
          <div class="flex align-items-center justify-content-center border-round-xl mx-auto mb-3"
               style="width:5rem;height:5rem;background-color:var(--primary-100)">
            <i class="pi pi-user text-5xl text-primary"></i>
          </div>
          <h3 class="m-0">{{ user.name || user.username }}</h3>
          <p class="text-color-secondary mt-1 mb-3">{{ '@' + user.username }}</p>
          <div class="flex justify-content-center gap-2 mb-3">
            <p-tag [value]="user.role" [severity]="getRoleSeverity(user.role)"></p-tag>
            <p-tag [value]="user.status" [severity]="getStatusSeverity(user.status)"></p-tag>
          </div>
          <p-divider></p-divider>
          <div class="text-left">
            <div class="flex align-items-center gap-2 mb-2">
              <i class="pi pi-envelope text-color-secondary"></i>
              <span class="text-sm">{{ user.email }}</span>
            </div>
            <div class="flex align-items-center gap-2">
              <i class="pi pi-calendar text-color-secondary"></i>
              <span class="text-sm text-color-secondary">Joined {{ user.created_at | date:'mediumDate' }}</span>
            </div>
          </div>
        </div>
      </p-card>
    </div>

    <!-- Edit Profile Card -->
    <div class="col-12 lg:col-8">
      <p-card header="Edit Profile" styleClass="shadow-1 mb-4">
        <div class="grid">
          <div class="col-12 md:col-6">
            <label class="block font-medium mb-2">Username</label>
            <input pInputText [value]="user.username" [disabled]="true" class="w-full" />
            <small class="text-color-secondary">Username cannot be changed</small>
          </div>
          <div class="col-12 md:col-6">
            <label class="block font-medium mb-2">Name</label>
            <input pInputText [(ngModel)]="name" placeholder="Enter your name" class="w-full" />
          </div>
          <div class="col-12 md:col-6">
            <label class="block font-medium mb-2">Email</label>
            <input pInputText [(ngModel)]="email" placeholder="Enter your email" class="w-full" type="email" />
          </div>
          <div class="col-12">
            <p-button icon="pi pi-check" label="Save Changes" [loading]="savingProfile"
                      (onClick)="saveProfile()"></p-button>
          </div>
        </div>
      </p-card>

      <p-card header="Change Password" styleClass="shadow-1">
        <div class="grid">
          <div class="col-12 md:col-6">
            <label class="block font-medium mb-2">Current Password</label>
            <p-password [(ngModel)]="currentPassword" [toggleMask]="true" [feedback]="false"
                        styleClass="w-full" inputStyleClass="w-full"></p-password>
          </div>
          <div class="col-12 md:col-6"></div>
          <div class="col-12 md:col-6">
            <label class="block font-medium mb-2">New Password</label>
            <p-password [(ngModel)]="newPassword" [toggleMask]="true" [feedback]="true"
                        styleClass="w-full" inputStyleClass="w-full"></p-password>
          </div>
          <div class="col-12 md:col-6">
            <label class="block font-medium mb-2">Confirm New Password</label>
            <p-password [(ngModel)]="confirmPassword" [toggleMask]="true" [feedback]="false"
                        styleClass="w-full" inputStyleClass="w-full"></p-password>
          </div>
          <div class="col-12">
            <p-button icon="pi pi-lock" label="Change Password" severity="warn"
                      [loading]="savingPassword" (onClick)="changePassword()"></p-button>
          </div>
        </div>
      </p-card>
    </div>
  </div>
</div>
